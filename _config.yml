# Site Settings
title: "Jamie Nam"
description: "Personal Academic Website"
email: jamie.nam01@gmail.com

# Base URL: empty for user site (repository named jamienam.github.io)
# This deploys to https://jamienam.github.io/ instead of a subdirectory
baseurl: ""
url: "https://jamienam.github.io"

# Pagination
paginate: 4
permalink: /blog/:year/:title/
paginate_path: /blog/page:num/

# Social media links in footer
# Leave fields empty or remove them to hide the corresponding button
linkedin: "jamienam"
researchgate: "Jamie-Nam-2"
github: "jamienam"

# Markdown
highlighter: rouge
markdown: kramdown

# optimization -> compress.html
compress_html:
  clippings: [html,div, p, ul, td, h1, h2, h3, h4,link, meta, footer, nav, img, header, hr, br, head, style, li, ul, ol, time, main, script, title]
  comments: ["<!-- ", " -->"]
  endings: [all]
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: []

#collection
collections:
  projects:
    output: true
    permalink: /projects/:name/
    order:
      - shortProject.md
      - longerProjectTitle.md
      - redirect.md
      - project4.md
      - project5.md
      - project6.md

sass:
  sass_dir: /assets/css/_sass
  style: compressed

include:
  - _pages

exclude:
  - README.md
  - LICENSE.md

plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-email-protect
  - jekyll-target-blank
